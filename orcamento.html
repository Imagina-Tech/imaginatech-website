<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <title>Orçamento - ImaginaTech | Impressão 3D</title>
    <meta name="description" content="Visualize seu orçamento personalizado da ImaginaTech - Impressão 3D de qualidade.">
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        /* ==================== RESET E VARIÁVEIS ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-bg: #0a0e1a;
            --card-bg: rgba(20, 26, 45, 0.95);
            --neon-blue: #00d4ff;
            --secondary-blue: #00a8e8;
            --neon-red: #ff0055;
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ==================== BACKGROUND EFFECTS ==================== */
        .cosmic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .grid-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* ==================== NAVIGATION ==================== */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .logo-img {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .logo-text {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--neon-blue), var(--secondary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn-nav {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid transparent;
        }

        .btn-track-order {
            background: rgba(0, 212, 255, 0.1);
            color: var(--neon-blue);
            border-color: var(--neon-blue);
        }

        .btn-track-order:hover {
            background: var(--neon-blue);
            color: var(--dark-bg);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-whatsapp {
            background: rgba(37, 211, 102, 0.1);
            color: #25d366;
            border-color: #25d366;
        }

        .btn-whatsapp:hover {
            background: #25d366;
            color: white;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.5);
            transform: translateY(-2px);
        }

        /* ==================== MAIN CONTENT ==================== */
        .main-content {
            padding-top: 120px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-wrapper {
            max-width: 1200px;
            width: 100%;
            padding: 40px 20px;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
            }

            .nav-actions {
                flex-direction: column;
                gap: 10px;
            }

            .btn-nav {
                padding: 10px 20px;
                font-size: 0.9rem;
                width: 100%;
                justify-content: center;
            }

            .logo-text {
                font-size: 1.2rem;
            }

            .logo-img {
                width: 40px;
                height: 40px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 15px 15px;
            }

            .logo-section {
                gap: 10px;
            }

            .logo-text {
                font-size: 1rem;
            }

            .logo-img {
                width: 35px;
                height: 35px;
            }

            .btn-nav {
                font-size: 0.85rem;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="cosmic-bg">
        <div class="grid-lines"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo-section">
                <img src="imaginatech_logo.jpeg" alt="ImaginaTech Logo" class="logo-img">
                <span class="logo-text">ImaginaTech</span>
            </a>
            <div class="nav-actions">
                <a href="/acompanhar-pedido" class="btn-nav btn-track-order">
                    <i class="fas fa-search"></i>
                    Acompanhar Pedido
                </a>
                <a href="https://wa.me/5521968972539" target="_blank" class="btn-nav btn-whatsapp">
                    <i class="fab fa-whatsapp"></i>
                    WhatsApp
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="content-wrapper">
            <!-- Conteúdo do orçamento será adicionado aqui -->
        </div>
    </main>
</body>
</html>
